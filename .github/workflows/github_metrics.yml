name: Git-Hub Metrics

on:
  # Atualiza automaticamente todo dia às 6h UTC
  schedule:
    - cron: "0 6 * * *"
  # Permite rodar manualmente
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

          # Configuração básica
          config: classic
          filename: metrics.svg

